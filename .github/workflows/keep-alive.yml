name: Keep site awake

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Call keep-alive endpoint
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          KEEP_ALIVE_SECRET: ${{ secrets.KEEP_ALIVE_SECRET }}
        run: |
          if [ -z "$SITE_URL" ]; then
            echo "SITE_URL secret is missing"
            exit 1
          fi

          curl --fail --silent --show-error \
            --max-time 20 \
            -H "x-keep-alive-secret: $KEEP_ALIVE_SECRET" \
            "$SITE_URL/api/keep-alive"
